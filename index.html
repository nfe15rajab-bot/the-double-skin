<!DOCTYPE html>
<html>
    <head>
        <title> The double skin </title>
        <style>
            *{
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #000;
                overflow: hidden;
            }
            #controls  
                {
                max-height: 90vh;
                overflow-y: auto;        

                width : clamp(180px, 16vw, 280px);
                font-size:clamp(11px, 10vw, 14px);
                position: fixed;
                top: 20px;
                left:20px;
                z-index:25;
                background: rgba(20, 20, 30, 0.85);
                padding: 20px;
                border-radius: 12px;
                color: #fff;
                font-family: Arial, sans-serif;
                font-size:13px;
                backdrop-filter:blur(6px);
            }
        

            #toggle {
                display: block;
                width: 100%;
                margin-bottom:16px;
                padding:8px;
                font-size:13px;
                cursor:pointer;
                border:1px solid rgba(255,255,255,0.6);
                border-radius: 8px;
                background:rgba(255, 255, 255, 0,1);
                color: black;
            }
            .control-group {
                margin-bottom:14px;
            }

            label {
                display:block;
                margin-bottom:4px;
                color:rgba(255, 255, 255, 0.3)

            }
            input[type="range"]{
                width:100%;
                max-width:100%;
                height:4px;
                cursor:pointer;
                accent-color: #93c5fd;
            }
            input[type="color"]{
                width:100%;
                height:36px;
                cursor:pointer;
                border:none;
                border-radius:6px;
                background:none;
            }
            .btn {
                width:100%;
                height:36px;
                font-size:13px;
                cursor:pointer;
                border:1px solid rgba(255, 255, 255, 0.2);
                border-radius:8px;
                background:rgba(255, 255, 255, 0.1);
                color: white;
                margin-top: 8px;


            }
            .btn:hover{
                background: rgba(255, 255, 255, 0.2);

            }
            #starControls {
                display:none;
            }
            input[type="number"], input[type="date"]{
                width: 100%;
                background: rgba(255, 255, 255, 0.1);
                border:1px solid rgba(255, 255, 255, 0.2);
                border-radius:6px;
                color:white;
                padding:4px 8px;
                font-size: 12px;
            }
        </style>

    </head>
    <body>
        <script src="suncalc.js"></script>
        
        <canvas id="canvas"></canvas>
        <div id="controls" >
            <button id = "toggle"> Mode: Hex</button>
            <button class="btn" id ="solarModeBtn"> Solar Mode: Off</button>
            <div class = "control-group">
                <label>Sigma: <span id ="sigmaVal">1000</span></label><br>
                <input type ="range" min="50" max="1500" value = "200" id="sigmaSlider" >
            </div>
            <div class = "control-group">
                <label> Radius:<span id="radiusVal">200</span></label><br>
                <input type = "range" min = "20" max = "300" value = "50" id="radiusSlider" >
            </div>
            <div class = "control-group" id="starControls">
                <label> Star angle : <span id="starVal">0.5</span></label><br>
                <input type ="range" min="1" max="99" value="50" id="starSlider" >
            </div>
            <div class = "control-group">
                <label>Surface color</label><br>
                <input type="color" id="colorPicker" value="#f865ab" >
            </div>
            <div class = "control-group">
                <button id = "exportBtn" >
                    Export SVG
                </button>
            </div>
            <div class = "control-group">
                <button id="freezeBtn" class = "btn">
                    ❄️ Freeze
                </button>
            </div>
            <div class="control-group" id="solarPanel">
            <label style = "color:#34543b; font-weight:bold;"> Solar </label>
            <div class="control-group">
                <label>Latitude</label>
                <input type ="number" id ="latInput" value="33.57" step="0.01">
            </div>
            <div class="control-group">
                <label>Longitude</label>
                <input type="number" id="lngInput" value="-7.80" step="0.01">
            </div>
            <div class="control-group">
                <label>Date</label>
                <input type="date" id="dateInput">
            </div>
            <div class="control-group">
                <label>Hour :<span id ="hourVal">12</span>h</label>
                <input type="range" min="0" max ="23" value="12" id="hourSlider">

            </div>
            <div class="control-group">
                <label>Scale: 1px =<span id="scaleVal">5</span>mm</label>
                <input type ="range" min="1" max="50" value="5" id="scaleSlider">
            </div>
            <button class = "btn" id="calculateBtn">Calculate</button>
            <canvas id="sunArc" width="180" height="90" style="width:100%; border-radius:6px; margin-top:6px;"></canvas>
            <div id="solarOutput" style="margin-top:8px; font-size:11px; color:rgba(255, 255, 255, 0.7); line-height:1.8;">
                <div>Altitude: <span id="outAltitude">-</span>°</div>
                <div>Azimuth: <span id="outAzimuth">-</span>°</div>
                <div>Void ratio: <span id="outVoid">-</span>%</div>
                <div>Opening area: <span id="outArea">-</span>cm2</div>
                <div>Irradiance: <span id="outIrradiance">-</span>W/m2</div>
            </div>
            <button class = "btn" id="exportJSON"> EXPORT JSON</button>

        </div>
        </div>
    
        

        
        <script src="sketch.js"></script>
        
        
    </body>
</html>
